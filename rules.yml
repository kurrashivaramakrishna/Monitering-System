groups:
  - name: system-alerts
    rules:
      - alert: HighDiskUsage
        expr: |
          100 - (
            node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} * 100
            /
            node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}
          ) > 75
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High SSD Usage"
          description: "Disk usage is above 75%."
